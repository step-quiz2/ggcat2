<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curs de GeoGebra — GeoCat</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="curs.css">
</head>
<body>

<header class="curs-header">
  <span class="curs-header-logo">
    <span class="logo-icon"></span>
    GeoCat
  </span>
  <nav class="curs-nav">
    <a href="capitol-1.html" class="active">Capítols</a>
    <a href="repte-1.html">Reptes</a>
  </nav>
  <span class="curs-header-title">Curs de GeoGebra</span>
</header>

<div class="curs-index-hero">
  <h1>Aprèn GeoGebra de veritat<br>des del navegador</h1>
  <p>
    Capítols curts, construccions interactives i reptes amb validació automàtica.
    Tot sense instal·lar res.
  </p>
</div>

<ul class="capitols-list" id="capitols-list"></ul>

<script src="glossari-data.js"></script>
<script src="capitols.js"></script>
<script>
  injectCursLogo();

  // Genera la llista de capítols i reptes
  (function renderIndex() {
    const list = document.getElementById('capitols-list');
    if (!list) return;
    const progress = getProgress();

    let html = '';

    // Capítols
    for (const c of CAPITOLS_DATA) {
      const done = c.goalId && progress[c.goalId];
      const check = done ? ' ✓' : '';
      html += `
        <li class="capitol-card">
          <a href="${c.arxiu}">
            <span class="capitol-card-num">${c.num}</span>
            <span class="capitol-card-titol">${c.titol}${check}</span>
            <span class="capitol-card-arrow">→</span>
          </a>
        </li>`;
    }

    // Separador
    html += '<li style="margin:1.2rem 0;border-top:1px solid #d0d0d0"></li>';

    // Etiquetes de dificultat per als reptes
    const difLabel = { facil: '🟢 Fàcil', mitja: '🟡 Mitjà', dificil: '🔴 Difícil' };

    // Reptes
    for (const r of REPTES_DATA) {
      const done = r.goalId && progress[r.goalId];
      const check = done ? ' ✓' : '';
      const dif = difLabel[r.dificultat] || '';
      html += `
        <li class="capitol-card">
          <a href="${r.arxiu}">
            <span class="capitol-card-num">⚡${r.num}</span>
            <span class="capitol-card-titol">${r.titol}${check}</span>
            <span class="capitol-card-arrow" style="font-size:0.7rem;color:#6b7280">${dif}</span>
          </a>
        </li>`;
    }

    list.innerHTML = html;
  })();
</script>

</body>
</html>
